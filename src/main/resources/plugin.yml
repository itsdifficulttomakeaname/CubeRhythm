name: CubeRhythm
version: '1.0'
main: org.cubeRhythm.Main
api-version: '1.20'
authors: [ AluminumNitrate(Little AcidAluminum) with Jason31416 ]
description: A 3D rhythm game in Minecraft

commands:
  play:
    description: Start playing a chart
    usage: /play [chartId] [speed]
    aliases: []
  debug:
    description: Debug chart information
    usage: /debug <chartId>
  exit:
    description: Exit the current game
    usage: /exit
    aliases: [quit]
  gui:
    description: Open the chart selector GUI
    usage: /gui
    aliases: [menu, charts]
